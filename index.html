<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xem Phim Online</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(circle at top, #1b1b1b, #050505 70%);
    color: #fff;
    font-family: "Segoe UI", Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  .particle {
    position: absolute;
    bottom: -10px;
    width: 4px;
    height: 4px;
    background: #e50914;
    border-radius: 50%;
    opacity: 0.6;
    animation: float 8s linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    100% { transform: translateY(-110vh) translateX(20px); opacity: 0; }
  }

  .movie-card {
    background: linear-gradient(160deg, #1a1a1a, #101010);
    border-radius: 18px;
    overflow: hidden;
    width: 360px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 20px 50px rgba(0,0,0,0.7);
    position: relative;
    z-index: 2;
    animation: cardIn 0.7s cubic-bezier(.2,.9,.3,1.3);
    transition: transform 0.35s ease, box-shadow 0.35s ease;
  }

  .movie-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 0 0 1px rgba(229,9,20,0.4), 0 30px 60px rgba(229,9,20,0.25);
  }

  @keyframes cardIn {
    0% { opacity: 0; transform: translateY(40px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .poster-wrap {
    position: relative;
    overflow: hidden;
  }

  .poster-wrap img {
    width: 100%;
    height: 480px;
    object-fit: cover;
    display: block;
    transition: transform 0.6s ease;
  }

  .movie-card:hover .poster-wrap img {
    transform: scale(1.08);
  }

  .poster-wrap::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.05) 40%);
  }

  .badge {
    position: absolute;
    top: 14px;
    left: 14px;
    background: #e50914;
    color: #fff;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.5px;
    padding: 5px 10px;
    border-radius: 5px;
    z-index: 3;
    animation: pulse 1.6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.85; }
  }

  .movie-info {
    padding: 20px 18px 24px;
    text-align: center;
  }

  .movie-info h2 {
    font-size: 21px;
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }

  .movie-info p {
    font-size: 13px;
    color: #999;
    margin-bottom: 20px;
  }

  .watch-btn {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #ff1f2e, #b0060f);
    color: #fff;
    border: none;
    padding: 13px 30px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    text-decoration: none;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(229,9,20,0.4);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .watch-btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
    transform: skewX(-25deg);
    animation: shine 2.5s infinite;
  }

  @keyframes shine {
    0% { left: -75%; }
    50% { left: 130%; }
    100% { left: 130%; }
  }

  .watch-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 10px 28px rgba(229,9,20,0.6);
  }

  .watch-btn:active {
    transform: scale(0.97);
  }

  .play-icon {
    font-size: 14px;
  }
</style>
</head>
<body>

  <div class="movie-card">
    <div class="poster-wrap">
      <span class="badge">HD • VIETSUB</span>
      <img src="https://i.pinimg.com/736x/2e/76/c1/2e76c1c0e3778b568b1ad7ca5f841801.jpg" alt="Movie Poster">
    </div>
    <div class="movie-info">
      <h2>Xem Phim Full HD</h2>
      <p>1080p • Không quảng cáo • Cập nhật mới nhất</p>
      <a href="https://zyo.lol/tiniluvhih" class="watch-btn">
        <span class="play-icon">▶</span> Xem Phim Ngay
      </a>
    </div>
  </div>

<script>
  const body = document.body;
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDelay = (Math.random() * 8) + 's';
    p.style.animationDuration = (6 + Math.random() * 6) + 's';
    body.appendChild(p);
  }
</script>

</body>
</html>
